<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 5th Anniversary ❤️</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES — Design Tokens
    ============================================================ */
    :root {
      --blush:      #FFF0F5;
      --rose-petal: #F8E8F0;
      --lilac:      #EAD7F7;
      --cream:      #FFF8F2;
      --mauve:      #D4A8C7;
      --deep-rose:  #C084A0;
      --wine:       #9B5B7E;
      --text-dark:  #3E2336;
      --text-mid:   #7A4F68;
      --text-light: #B88FAA;
      --glass-bg:   rgba(255, 255, 255, 0.45);
      --glass-border: rgba(255, 255, 255, 0.65);
      --shadow-soft: 0 8px 40px rgba(160, 90, 130, 0.12);
      --shadow-lift: 0 20px 60px rgba(160, 90, 130, 0.22);
      --radius-lg:  24px;
      --radius-xl:  36px;
      --ff-display: 'Playfair Display', Georgia, serif;
      --ff-body:    'Lato', sans-serif;
      --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--ff-body);
      color: var(--text-dark);
      background: var(--cream);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ============================================================
       AMBIENT BACKGROUND — Floating Hearts Layer
    ============================================================ */
    #hearts-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }

    /* ============================================================
       SCROLL REVEAL
    ============================================================ */
    .reveal {
      opacity: 0;
      transform: translateY(36px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    /* Fallback: ensure images inside gallery are ALWAYS visible regardless of reveal state */
    .gallery-item img {
      opacity: 1 !important;
    }

    /* ============================================================
       NAV
    ============================================================ */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 248, 242, 0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--glass-border);
      transition: var(--transition);
    }

    .nav-logo {
      font-family: var(--ff-display);
      font-size: 1.25rem;
      font-style: italic;
      color: var(--deep-rose);
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-mid);
      text-decoration: none;
      transition: color 0.25s;
    }

    .nav-links a:hover { color: var(--deep-rose); }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }

    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--deep-rose);
      border-radius: 2px;
      transition: var(--transition);
    }

    /* ============================================================
       HERO SECTION
    ============================================================ */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(234,215,247,0.7) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(248,232,240,0.8) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 70%, rgba(255,240,245,0.9) 0%, transparent 60%),
        var(--cream);
      z-index: 1;
    }

    /* Signature element: animated SVG heart that draws itself */
    .hero-heart-svg {
      width: min(260px, 55vw);
      height: auto;
      margin-bottom: 32px;
      filter: drop-shadow(0 4px 24px rgba(192, 132, 160, 0.4));
    }

    .hero-heart-path {
      fill: none;
      stroke: url(#heartGrad);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: drawHeart 2.2s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
    }

    .hero-heart-fill {
      opacity: 0;
      animation: fillHeart 0.8s ease 2.6s forwards;
    }

    @keyframes drawHeart {
      to { stroke-dashoffset: 0; }
    }

    @keyframes fillHeart {
      to { opacity: 0.18; }
    }

    .hero-eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--deep-rose);
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 0.8s ease 2.8s forwards;
    }

    .hero-title {
      font-family: var(--ff-display);
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 700;
      line-height: 1.08;
      color: var(--text-dark);
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.9s ease 3.0s forwards;
    }

    .hero-title em {
      font-style: italic;
      color: var(--deep-rose);
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 300;
      color: var(--text-mid);
      margin-top: 20px;
      max-width: 520px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.9s ease 3.2s forwards;
    }

    .hero-cta {
      margin-top: 44px;
      opacity: 0;
      animation: fadeUp 0.9s ease 3.4s forwards;
    }

    .btn-primary {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: linear-gradient(135deg, var(--deep-rose), var(--wine));
      color: #fff;
      font-family: var(--ff-body);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(155, 91, 126, 0.38);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 18px 50px rgba(155, 91, 126, 0.5);
    }

    .btn-primary:active { transform: translateY(0) scale(0.98); }

    /* Ripple */
    .btn-primary .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background: rgba(255,255,255,0.35);
      animation: rippleAnim 0.65s linear;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    .hero-scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      animation: fadeUp 0.9s ease 3.8s forwards;
    }

    .scroll-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--mauve);
      animation: scrollBounce 1.5s ease-in-out infinite;
    }

    .scroll-dot:nth-child(2) { animation-delay: 0.2s; }
    .scroll-dot:nth-child(3) { animation-delay: 0.4s; opacity: 0.4; }

    @keyframes scrollBounce {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(8px); opacity: 0.4; }
    }

    /* ============================================================
       SECTION WRAPPER
    ============================================================ */
    .section {
      position: relative;
      z-index: 1;
      padding: 100px 24px;
    }

    .section-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--deep-rose);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--ff-display);
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--text-dark);
      margin-bottom: 16px;
    }

    .section-title em { font-style: italic; color: var(--deep-rose); }

    .section-sub {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-mid);
      max-width: 520px;
      line-height: 1.75;
      margin-bottom: 60px;
    }

    /* ============================================================
       GLASS CARD
    ============================================================ */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    /* ============================================================
       TIMELINE
    ============================================================ */
    #timeline {
      background:
        radial-gradient(ellipse 70% 50% at 0% 50%, rgba(234,215,247,0.55) 0%, transparent 65%),
        var(--blush);
    }

    .timeline-wrapper {
      position: relative;
      padding-left: 0;
    }

    /* Vertical line */
    .timeline-line {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--mauve) 15%, var(--mauve) 85%, transparent);
      transform: translateX(-50%);
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      align-items: center;
      gap: 0;
      margin-bottom: 56px;
    }

    .timeline-item:last-child { margin-bottom: 0; }

    .timeline-card {
      padding: 28px 32px;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .timeline-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lift);
    }

    .timeline-item:nth-child(odd) .timeline-card { grid-column: 1; }
    .timeline-item:nth-child(odd) .timeline-dot  { grid-column: 2; }
    .timeline-item:nth-child(odd) .timeline-empty { grid-column: 3; }

    .timeline-item:nth-child(even) .timeline-empty { grid-column: 1; }
    .timeline-item:nth-child(even) .timeline-dot  { grid-column: 2; }
    .timeline-item:nth-child(even) .timeline-card { grid-column: 3; }

    .timeline-dot {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timeline-dot-inner {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--deep-rose), var(--lilac));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 0 6px rgba(212,168,199,0.25), 0 4px 20px rgba(155,91,126,0.3);
    }

    .timeline-year {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--deep-rose);
      margin-bottom: 6px;
    }

    .timeline-card h3 {
      font-family: var(--ff-display);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .timeline-card p {
      font-size: 0.88rem;
      line-height: 1.75;
      color: var(--text-mid);
    }

    .timeline-empty { display: block; }

    /* ============================================================
       MEMORY GALLERY
    ============================================================ */
    #gallery {
      background: var(--cream);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .gallery-item {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 4/5;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
    }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block !important;
      opacity: 1 !important;
      visibility: visible !important;
      transition: transform 0.55s ease;
    }

    /* Placeholder gradient for missing images */
    .gallery-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--rose-petal), var(--lilac));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.55s ease;
    }

    .gallery-placeholder-icon { font-size: 2.2rem; }
    .gallery-placeholder-text {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--wine);
      opacity: 0.7;
    }

    .gallery-item:hover img,
    .gallery-item:hover .gallery-placeholder { transform: scale(1.07); }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(62,35,54,0.55) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.35s;
      display: flex;
      align-items: flex-end;
      padding: 20px;
    }

    .gallery-item:hover .gallery-overlay { opacity: 1; }

    .gallery-overlay-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(30, 10, 24, 0.88);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
    }

    #lightbox.active { display: flex; }

    #lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      animation: lightboxIn 0.35s ease;
    }

    @keyframes lightboxIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    #lightbox-inner img {
      display: block;
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }

    #lightbox-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      backdrop-filter: blur(8px);
    }

    #lightbox-close:hover { background: rgba(255,255,255,0.35); }

    /* ============================================================
       REASONS I LOVE YOU
    ============================================================ */
    #reasons {
      background:
        radial-gradient(ellipse 65% 55% at 100% 50%, rgba(248,232,240,0.9) 0%, transparent 65%),
        var(--blush);
    }

    .reasons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .reason-card {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .reason-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lift);
    }

    .reason-number {
      font-family: var(--ff-display);
      font-size: 2.2rem;
      font-weight: 700;
      font-style: italic;
      color: var(--mauve);
      opacity: 0.5;
      line-height: 1;
    }

    .reason-icon { font-size: 1.5rem; }

    .reason-card h4 {
      font-family: var(--ff-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .reason-card p {
      font-size: 0.86rem;
      line-height: 1.72;
      color: var(--text-mid);
    }

    /* ============================================================
       LOVE COUNTER
    ============================================================ */
    #counter {
      background: linear-gradient(135deg, var(--deep-rose) 0%, var(--wine) 50%, #6B3554 100%);
      color: #fff;
      text-align: center;
    }

    #counter .section-eyebrow { color: rgba(255,255,255,0.65); }
    #counter .section-title { color: #fff; }
    #counter .section-title em { color: rgba(255,248,242,0.8); }
    #counter .section-sub { color: rgba(255,255,255,0.7); margin-left: auto; margin-right: auto; }

    .counter-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
    }

    .counter-unit {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      min-width: 120px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s;
    }

    .counter-unit:hover { transform: scale(1.05); }

    .counter-value {
      font-family: var(--ff-display);
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1;
      color: #fff;
    }

    .counter-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
    }

    /* ============================================================
       LOVE LETTER
    ============================================================ */
    #letter {
      background: var(--cream);
    }

    .letter-card {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 52px;
      position: relative;
      overflow: hidden;
    }

    .letter-card::before {
      content: '"';
      font-family: var(--ff-display);
      font-size: 14rem;
      color: var(--mauve);
      opacity: 0.08;
      position: absolute;
      top: -30px; left: 24px;
      line-height: 1;
      pointer-events: none;
    }

    .letter-greeting {
      font-family: var(--ff-display);
      font-size: 1.3rem;
      font-style: italic;
      color: var(--deep-rose);
      margin-bottom: 24px;
    }

    #typewriter-text {
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text-mid);
      min-height: 200px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--deep-rose);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .letter-sign {
      font-family: var(--ff-display);
      font-size: 1.4rem;
      font-style: italic;
      color: var(--deep-rose);
      margin-top: 36px;
      text-align: right;
    }

    /* =========
